// MODULE 6: ACCOUNT ACTIVATION TRACKING
// ============================================================
function renderModuleAccounts(code, country) {
  const accs = country.accountActivations || [];
  const rows = accs.map(a => {
    const isActive = !!a.activatedAt; const deadline = new Date(a.deadlineAt).getTime();
    const now = Date.now(); const isOverdue = !isActive && now >= deadline;
    return `<tr>
      <td><strong>${a.accountName}</strong></td>
      <td>${formatDate(a.requestedAt)}</td><td>${formatDate(a.deadlineAt)}</td>
      <td><span class="countdown ${isActive?'activated':isOverdue?'overdue':''}" data-deadline="${a.deadlineAt}" data-activated="${a.activatedAt||''}" id="countdown-${a.id}">${isActive?'✓ Activated':isOverdue?'⚠ Overdue!':'...'}</span></td>
      <td>${isActive?'<span class="badge badge-green">Activated</span>':(isOverdue?'<span class="badge badge-red">Overdue!</span>':'<span class="badge badge-yellow">Pending</span>')}</td>
      <td><span class="editable-value" style="font-size:var(--text-xs)" onclick="editAccNotes(this,'${code}','${a.id}')">${a.notes||'+'}</span></td>
      <td>${!isActive?`<button class="btn btn-secondary btn-sm" onclick="markActivated('${code}','${a.id}')">✓ Activate</button>`:''}<button class="btn btn-danger btn-sm" onclick="deleteAccount('${code}','${a.id}')">✕</button></td>
    </tr>`;
  }).join('');
  return `
    <div class="module-section">
      <div class="module-section-header"><h3>◷ 账号开通追踪</h3><button class="btn btn-primary btn-sm" onclick="addAccount('${code}')">+ Add</button></div>
      <div class="module-section-body"><table class="data-table"><thead><tr><th>Account</th><th>Requested</th><th>Deadline</th><th>Countdown</th><th>Status</th><th>Notes</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="7" style="color:var(--color-faint);text-align:center">No accounts</td></tr>'}</tbody></table></div>
    </div>`;
}

function startCountdowns() {
  document.querySelectorAll('.countdown').forEach(el => {
    const deadline = el.dataset.deadline, activated = el.dataset.activated;
    if (!deadline || activated) return;
    const update = () => {
      const now = Date.now(), dl = new Date(deadline).getTime(), remaining = Math.max(0, dl - now);
      if (remaining <= 0) { el.textContent = '⚠ Overdue!'; el.className = 'countdown overdue'; return; }
      const h = Math.floor(remaining/3600000), m = Math.floor((remaining%3600000)/60000), s = Math.floor((remaining%60000)/1000);
      el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      if (h < 6) el.className = 'countdown overdue'; else if (h < 12) el.className = 'countdown';
    };
    update(); const timerId = setInterval(update, 1000); activeCountdowns.push(timerId);
  });
}
function addAccount(code) { const name=prompt('Account name:'); if(!name)return; const country=getCountry(code); const now=new Date(); country.accountActivations.push({id:genId(),accountName:name,requestedAt:now.toISOString(),deadlineAt:new Date(now.getTime()+48*3600000).toISOString(),activatedAt:null,notes:''}); country.lastModified=new Date().toISOString(); saveData(appData); handleRoute(); showToast('Account added','success'); }
function markActivated(code,accId) { const country=getCountry(code); const acc=country.accountActivations.find(a=>a.id===accId); if(!acc)return; acc.activatedAt=new Date().toISOString(); country.lastModified=new Date().toISOString(); saveData(appData); handleRoute(); showToast('Activated','success'); }
function editAccNotes(el,code,accId) { const country=getCountry(code); const acc=country.accountActivations.find(a=>a.id===accId); if(!acc)return; const input=document.createElement('input'); input.type='text'; input.className='editable-input wide'; input.value=acc.notes||''; el.replaceWith(input); input.focus(); const commit=()=>{acc.notes=input.value;country.lastModified=new Date().toISOString();saveData(appData);handleRoute();}; input.addEventListener('blur',commit); input.addEventListener('keydown',e=>{if(e.key==='Enter')input.blur();if(e.key==='Escape')input.replaceWith(el);}); }
function deleteAccount(code,accId) { if(!confirm('Delete?'))return; const country=getCountry(code); country.accountActivations=country.accountActivations.filter(a=>a.id!==accId); country.lastModified=new Date().toISOString(); saveData(appData); handleRoute(); showToast('Deleted','error'); }

// ============================================================
// MODULE 7: LEGAL / DEV SYNC (WITH PROJECT NAME)

function renderModuleLegalSync(code, country) {
  const projects = country.legalSync.projects || [];
  const bars = projects.map((ls, i) => {
    const delayed = ls.isDelayed;
    return `<div class="legal-sync-bar ${delayed?'delayed':''}" style="margin-bottom:${i<projects.length-1?'var(--space-md)':'0'}">
      <div class="legal-sync-item" style="min-width:160px">
        <span class="legal-sync-label">项目名称</span>
        <span class="legal-sync-value"><span class="editable-value" onclick="editLegalProjField(this,'${code}','${ls.id}','projectName')">${ls.projectName||'(set)'}</span></span>
      </div>
      <div class="legal-sync-item">
        <span class="legal-sync-label">状态</span>
        <span class="legal-sync-value"><span class="editable-value" onclick="editLegalProjStatus(this,'${code}','${ls.id}')"><span class="badge ${delayed?'badge-red':'badge-green'}">${ls.statusZh||ls.status||'Normal'}</span></span></span>
      </div>
      <div class="legal-sync-item"><span class="legal-sync-label">上次同步</span><span class="legal-sync-value"><span class="editable-value" onclick="editLegalProjDate(this,'${code}','${ls.id}','lastSyncDate')">${ls.lastSyncDate?formatDate(ls.lastSyncDate):'(set)'}</span></span></div>
      <div class="legal-sync-item"><span class="legal-sync-label">下次同步</span><span class="legal-sync-value"><span class="editable-value" onclick="editLegalProjDate(this,'${code}','${ls.id}','nextSyncDate')">${ls.nextSyncDate?formatDate(ls.nextSyncDate):'(set)'}</span></span></div>
      <div class="legal-sync-item"><span class="legal-sync-label">联系人</span><span class="legal-sync-value"><span class="editable-value" onclick="editLegalProjField(this,'${code}','${ls.id}','contactPerson')">${ls.contactPerson||'(set)'}</span><span style="font-size:var(--text-xs);color:var(--color-muted)">${ls.contactEmail||''}</span></span></div>
      <div class="legal-sync-item" style="flex:1;min-width:160px"><span class="legal-sync-label">备注</span><span class="legal-sync-value"><span class="editable-value" onclick="editLegalProjField(this,'${code}','${ls.id}','notes')">${ls.notes||'+'}</span></span></div>
    </div>${delayed?'<div style="margin-top:var(--space-sm);padding:var(--space-xs) var(--space-md);background:var(--color-risk-red-bg);border-radius:var(--radius-sm);font-size:var(--text-xs);color:var(--color-risk-red);font-weight:var(--weight-semibold)">⚠ 延迟预警 — 请立即跟进</div>':''}`;
  }).join('');

  return `
    <div class="module-section">
      <div class="module-section-header"><h3>§ 法务/开发同步</h3></div>
      <div class="module-section-body">${bars||'<div style="color:var(--color-faint);font-size:var(--text-sm)">暂无项目</div>'}</div>
    </div>`;
}

function getLegalProj(code, projId) {
  const country = getCountry(code);
  const projects = country.legalSync.projects || [];
  return projects.find(p => p.id === projId);
}

function editLegalProjStatus(el, code, projId) {
  const proj = getLegalProj(code, projId); if (!proj) return;
  const statuses = [{value:'normal',label:'正常'},{value:'delayed',label:'延迟'},{value:'completed',label:'已完成'}];
  const select = document.createElement('select'); select.className = 'editable-select';
  select.innerHTML = statuses.map(s => `<option value="${s.value}"${proj.status===s.value?' selected':''}>${s.label}</option>`).join('');
  el.replaceWith(select); select.focus();
  const commit = () => { const chosen = statuses.find(s=>s.value===select.value); proj.status=chosen.value; proj.statusZh=chosen.label; proj.isDelayed=chosen.value==='delayed'; getCountry(code).lastModified=new Date().toISOString(); saveData(appData); handleRoute(); };
  select.addEventListener('blur', commit); select.addEventListener('change', commit);
}

function editLegalProjDate(el, code, projId, field) {
  const proj = getLegalProj(code, projId); if (!proj) return;
  const input = document.createElement('input'); input.type = 'date'; input.className = 'editable-input';
  input.value = proj[field] ? proj[field].slice(0,10) : '';
  el.replaceWith(input); input.focus();
  const commit = () => { proj[field] = input.value ? new Date(input.value).toISOString() : ''; getCountry(code).lastModified=new Date().toISOString(); saveData(appData); handleRoute(); };
  input.addEventListener('blur', commit); input.addEventListener('change', commit);
}

function editLegalProjField(el, code, projId, field) {
  const proj = getLegalProj(code, projId); if (!proj) return;
  const input = document.createElement('input'); input.type = 'text'; input.className = 'editable-input wide';
  input.value = proj[field] || ''; el.replaceWith(input); input.focus();
  const commit = () => { proj[field] = input.value; getCountry(code).lastModified = new Date().toISOString(); saveData(appData); handleRoute(); };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') input.replaceWith(el); });
}

function exportCountry(code) {
  const country = getCountry(code); const score = calcScore(country.metrics); const wb = XLSX.utils.book_new();

  const metricRows = [
    { '指标': '系统对接完成率', '权重': 50, '当前': country.metrics.systemIntegration.value+'%', '备注': country.metrics.systemIntegration.notes||'' },
    { '指标': '工单录入完整率', '权重': 30, '当前': country.metrics.workOrderCompleteness.value+'%', '备注': country.metrics.workOrderCompleteness.notes||'' },
    { '指标': 'TIS账号使用率', '权重': 5, '当前': country.metrics.tisAccountUsage.value+'%', '备注': country.metrics.tisAccountUsage.notes||'' },
    { '指标': 'APP使用情况', '权重': 5, '当前': country.metrics.tisQARecords.value+'%', '备注': country.metrics.tisQARecords.notes||'' },
    { '指标': 'LMS系统使用率', '权重': 5, '当前': country.metrics.lmsUsage.value+'%', '备注': country.metrics.lmsUsage.notes||'' },
    { '指标': '待处理需求数量', '权重': 5, '当前': country.metrics.pendingRequirements.value, '备注': country.metrics.pendingRequirements.notes||'' },
    { '指标': '风险项', '权重': -10, '当前': country.metrics.riskItems.hasRisks?'YES':'NO', '备注': country.metrics.riskItems.description||'' },
    { '指标': '总分', '权重': '', '当前': score, '备注': getRiskLabel(getRiskLevel(score)) }
  ];
  addSheet(wb, metricRows, 'Core Metrics');

  const ganttRows = (country.gantt.projects||[]).map(p => ({
    '项目': p.title, '评估中': p.evaluatPct+'%', '对接中': p.integratPct+'%', '测试中': p.testPct+'%', '已上线': p.livePct+'%', '备注': p.notes||''
  }));
  addSheet(wb, ganttRows, 'Gantt');

  const wo = country.workOrders;
  addSheet(wb, [
    { '指标': '当周关闭<15min', '数值': wo.weeklyCloseUnder15min.value+'%', '总数': wo.weeklyCloseUnder15min.total, '环比': formatPct(wo.momChange.weeklyCloseUnder15min) },
    { '指标': '关闭时间异常', '数值': wo.abnormalCloseTime.value+'%', '总数': wo.abnormalCloseTime.total, '环比': formatPct(wo.momChange.abnormalCloseTime) },
    { '指标': '缺少结算时间', '数值': wo.missingSettlementTime.value+'%', '总数': wo.missingSettlementTime.total, '环比': formatPct(wo.momChange.missingSettlementTime) },
    { '指标': '保养24H关闭率', '数值': wo.maintenance24hCloseRate.value+'%', '总数': wo.maintenance24hCloseRate.total, '环比': formatPct(wo.momChange.maintenance24hCloseRate) },
    { '指标': '总合格率', '数值': wo.totalQualifiedRate+'%', '总数': '', '环比': formatPct(wo.momChange.totalQualifiedRate) }
  ], 'Work Orders');

  const tbRows = (wo.typeBreakdown||[]).map(t => ({ '类型': t.type, '总数': t.count, '合格': t.qualified, '不合格': t.count-t.qualified, '合格率': t.count>0?Math.round(t.qualified/t.count*100)+'%':'0%' }));
  addSheet(wb, tbRows, 'Type Breakdown');

  addSheet(wb, [{ 'TIS账号使用率': country.tisUsage.accountUsageRate+'%', 'TIS月度问答': country.tisUsage.monthlyQA, 'LMS账号激活率': country.lmsUsage.accountActivationRate+'%' }], 'TIS LMS');
  addSheet(wb, (country.requirements||[]).map(r=>({ '标题': r.titleZh||r.title, '状态': r.statusZh||r.status, '负责人': r.owner||'', '排期链接': r.domesticScheduleUrl||'', '备注': r.notes||'' })), 'Requirements');
  addSheet(wb, (country.accountActivations||[]).map(a=>({ '账号': a.accountName, '申请时间': formatDate(a.requestedAt), '截止': formatDate(a.deadlineAt), '开通': a.activatedAt?formatDate(a.activatedAt):'NOT YET', '备注': a.notes||'' })), 'Account Activations');
  const legalRows = (country.legalSync.projects||[]).map(p => ({ '项目名称': p.projectName||'', '状态': p.statusZh||p.status, '上次同步': formatDate(p.lastSyncDate), '下次同步': formatDate(p.nextSyncDate), '延迟': p.isDelayed?'YES':'No', '联系人': p.contactPerson||'', '邮箱': p.contactEmail||'', '备注': p.notes||'' }));
  addSheet(wb, legalRows, 'Legal Sync');

  XLSX.writeFile(wb, `${country.name}_数据_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('Exported!', 'success');
}

function addSheet(wb, rows, name) {
  if (!rows||rows.length===0) { XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([['No data']]), name); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const widths = Object.keys(rows[0]).map(k => ({ wch: Math.max(k.length, ...rows.map(r=>String(r[k]||'').length)) + 2 }));
  ws['!cols'] = widths;
  XLSX.utils.book_append_sheet(wb, ws, name);
}

// ============================================================
// AUTH
// ============================================================
function showLogin() {
  const overlay = document.createElement('div');
  overlay.className = 'auth-modal-overlay'; overlay.id = 'auth-overlay';
  overlay.innerHTML = `
    <div class="auth-modal">
      <h2>登录</h2>
      <p>输入邮箱和密码访问数据中心</p>
      <div class="auth-error" id="auth-error"></div>
      <input class="auth-input" type="email" id="auth-email" placeholder="Email">
      <input class="auth-input" type="password" id="auth-password" placeholder="Password">
      <button class="auth-btn primary" id="auth-submit">登录</button>
      <button class="auth-btn ghost" id="auth-toggle">没有账号？注册</button>
    </div>
  `;
  document.body.appendChild(overlay);
  let mode = 'login';

  document.getElementById('auth-submit').addEventListener('click', async () => {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    errEl.style.display = 'none';
    if (!email || !password) { errEl.textContent = '请填写邮箱和密码'; errEl.style.display = 'block'; return; }

    try {
      if (mode === 'login') {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        currentUser = data.user;
        onLoginSuccess();
      } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        if (data.user) {
          currentUser = data.user;
          errEl.textContent = '注册成功！请检查邮箱验证链接。';
          errEl.style.color = 'var(--color-risk-green)';
          errEl.style.display = 'block';
          setTimeout(() => onLoginSuccess(), 1500);
        }
      }
    } catch(err) {
      errEl.textContent = err.message || '认证失败';
      errEl.style.display = 'block';
    }
  });

  document.getElementById('auth-toggle').addEventListener('click', () => {
    mode = mode === 'login' ? 'signup' : 'login';
    document.getElementById('auth-submit').textContent = mode === 'login' ? '登录' : '注册';
    document.getElementById('auth-toggle').textContent = mode === 'login' ? '没有账号？注册' : '已有账号？登录';
    document.querySelector('.auth-modal h2').textContent = mode === 'login' ? '登录' : '注册';
  });

  document.getElementById('auth-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-submit').click();
  });
}

function onLoginSuccess() {
  const overlay = document.getElementById('auth-overlay');
  if (overlay) overlay.remove();
  updateUserUI();
  subscribeToChanges();
  handleRoute();
  showToast('已连接到云端', 'success');
}

function showLogout() {
  document.getElementById('auth-overlay')?.remove();
  currentUser = null;
  if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
  supabaseEnabled = false;
  updateSyncDot('offline');
  updateUserUI();
  handleRoute();
  showToast('已切换到离线模式', 'success');
}

function updateUserUI() {
  const el = document.getElementById('header-user');
  if (!el) return;
  if (currentUser) {
    const initial = (currentUser.email||'?')[0].toUpperCase();
    el.innerHTML = `<span class="header-user-avatar">${initial}</span> <span>${currentUser.email}</span> <button class="header-user-btn" onclick="showLogout()">退出</button>`;
  } else if (supabaseEnabled) {
    el.innerHTML = `<button class="header-user-btn" onclick="showLogin()">登录</button>`;
  } else {
    el.innerHTML = `<span style="font-size:10px;color:var(--color-faint)">离线模式</span>`;
  }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  console.log('App init');
  try {
    initSupabase();

    // Check for existing Supabase session
    if (supabaseEnabled && supabase) {
      const { data } = await sb.auth.getSession();
      if (data && data.session) {
        currentUser = data.session.user;
        console.log('Existing session found:', currentUser.email);
      }
    }

    appData = await initData();
    console.log('Data ready. Countries:', Object.keys(appData.countries).length);
    updateUserUI();

    if (currentUser && supabaseEnabled) {
      subscribeToChanges();
    }

    window.addEventListener('hashchange', function(e) {
      console.log('hashchange:', (e.oldURL||'').split('#')[1], '→', (e.newURL||'').split('#')[1]);
      handleRoute();
    });
    handleRoute();
    console.log('Map markers:', Object.keys(mapMarkers).length);
  } catch(err) {
    console.error('Init error:', err);
    document.body.innerHTML += `<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:2px solid red;padding:30px;border-radius:12px;z-index:99999"><h2 style="color:red">Error</h2><pre>${err.message}\n${err.stack}</pre></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
